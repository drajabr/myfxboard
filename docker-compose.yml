version: '3.8'

services:
  # PostgreSQL database
  postgres:
    image: postgres:16-alpine
    container_name: myfxboard-db
    environment:
      POSTGRES_USER: dashboard
      POSTGRES_PASSWORD: dashboard_pass
      POSTGRES_DB: myfxboard
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dashboard -d myfxboard"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - myfxboard-net

  # Node.js server (API + frontend)
  server:
    image: ghcr.io/drajabr/myfxboard:latest
    pull_policy: always
    container_name: myfxboard-server
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://dashboard:dashboard_pass@postgres:5432/myfxboard
      PORT: 3000
      LOG_LEVEL: info
      CONNECTOR_SHARED_SECRET: change-this-secret
      SYNC_REQUEST_TIMEOUT_MS: 5000
      SYNC_HISTORY_CHUNK_SIZE: 100
      SYNC_HISTORY_RATE_LIMIT_MS: 1500
      BACKFILL_WINDOW_DAYS: 90
    ports:
      - "3000:3000"
    volumes:
      # Optional: mount logs directory
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - myfxboard-net
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local

networks:
  myfxboard-net:
    driver: bridge
