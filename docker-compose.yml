version: '3.8'

services:
  # PostgreSQL database
  postgres:
    image: postgres:16-alpine
    container_name: mt5-dashboard-db
    environment:
      POSTGRES_USER: dashboard
      POSTGRES_PASSWORD: dashboard_pass
      POSTGRES_DB: mt5_dashboard
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dashboard -d mt5_dashboard"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mt5-dashboard-net

  # Node.js API backend
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mt5-dashboard-api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://dashboard:dashboard_pass@postgres:5432/mt5_dashboard
      PORT: 3000
      LOG_LEVEL: info
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      SYNC_REQUEST_TIMEOUT_MS: 5000
      SYNC_HISTORY_CHUNK_SIZE: 100
      SYNC_HISTORY_RATE_LIMIT_MS: 1500
      UNLOCK_TOKEN_TTL_MINUTES: 30
      BACKFILL_WINDOW_DAYS: 90
    ports:
      - "3000:3000"
    volumes:
      # Optional: mount logs directory
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - mt5-dashboard-net
    restart: unless-stopped

  # Nginx reverse proxy and static frontend
  nginx:
    image: nginx:alpine
    container_name: mt5-dashboard-nginx
    depends_on:
      - api
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/ssl:/etc/nginx/ssl:ro
    networks:
      - mt5-dashboard-net
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local

networks:
  mt5-dashboard-net:
    driver: bridge
