version: '3.8'

services:
  # PostgreSQL database
  postgres:
    image: postgres:16-alpine
    container_name: myfxboard-db
    environment:
      POSTGRES_USER: dashboard
      POSTGRES_PASSWORD: dashboard_pass
      POSTGRES_DB: myfxboard
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
      POSTGRES_HOST_AUTH_METHOD: scram-sha-256
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dashboard -d myfxboard"]
      interval: 3s
      timeout: 2s
      retries: 30
      start_period: 3s
    networks:
      - myfxboard-net

  # Node.js server (API + frontend)
  server:
    image: ghcr.io/drajabr/myfxboard:latest
    container_name: myfxboard-server
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://dashboard:dashboard_pass@postgres:5432/myfxboard
      PORT: 3000
      CONNECTOR_SHARED_SECRET: change-this-secret
    ports:
      - "3000:3000"
    volumes:
      # Optional: mount logs directory
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1));"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 25s
    networks:
      - myfxboard-net
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local

networks:
  myfxboard-net:
    driver: bridge
